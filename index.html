<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bright Future Awaits</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 3.5em;
      margin-bottom: 0.3em;
    }
    p {
      max-width: 600px;
      opacity: 0.8;
      margin-bottom: 2em;
      font-size: 1.2em;
    }
    .buttons a {
      margin: 0 10px;
      padding: 14px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    .primary {
      background: #3b82f6;
      color: white;
    }
    .secondary {
      border: 1px solid #3b82f6;
      color: #3b82f6;
    }
    .section {
      padding: 80px 20px;
      text-align: center;
    }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Bright Future Awaits</h1>
    <p>Building something meaningful. Simple, fast, and designed for what’s next.</p>
    <div class="buttons">
      <a href="#" class="primary">Get Started</a>
      <a href="#" class="secondary">Learn More</a>
    </div>
  </div>

  <div class="section">
    <h2>What this is about</h2>
    <div class="features">
      <div class="card">Fast and lightweight</div>
      <div class="card">Built for clarity</div>
      <div class="card">Ready to scale</div>
    </div>
  </div>

</body>
</html>
