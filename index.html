<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aaron DeNuto</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: white;
    }

    /* Top bar */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 15px 20px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .navbar img {
      position: absolute;
      left: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .navbar h1 {
      font-size: 1.5em;
      margin: 0;
    }

    /* Main section */
    .hero {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 70px);
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <img src="https://via.placeholder.com/100" alt="Profile">
    <h1>Aaron DeNuto</h1>
  </div>

  <div class="hero">
    <h2>Welcome to my site</h2>
  </div>

</body>
</html>
