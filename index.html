<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aaron DeNuto</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 15px 20px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .left {
      position: absolute;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .left img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .center h1 {
      margin: 0;
      font-size: 1.5em;
    }

    .right {
      position: absolute;
      right: 20px;
      display: flex;
      gap: 15px;
    }

    .right a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    /* MAIN */
    .main {
      padding: 60px 20px;
      max-width: 900px;
      margin: auto;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    h2 {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="left">
      <img src="https://via.placeholder.com/100" alt="Profile">
    </div>

    <div class="center">
      <h1>Aaron DeNuto</h1>
    </div>

    <div class="right">
      <a href="#">GitHub</a>
      <a href="#">LinkedIn</a>
      <a href="#">Twitter</a>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <h2>Projects</h2>

    <div class="projects">
      <div class="card">
        <h3>Project One</h3>
        <p>Short description of what it does.</p>
      </div>

      <div class="card">
        <h3>Project Two</h3>
        <p>Short description of what it does.</p>
      </div>

      <div class="card">
        <h3>Project Three</h3>
        <p>Short description of what it does.</p>
      </div>
    </div>
  </div>

</body>
</html>
