<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOM Clone</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
  }

  h1 { margin-bottom: 20px; }

  select {
    padding: 10px;
    margin-bottom: 20px;
    background: #222;
    color: white;
    border: none;
  }

  .meal { margin-bottom: 25px; }

  .item {
    opacity: 0.85;
    margin-left: 10px;
    margin-top: 4px;
  }
</style>
</head>

<body>

<h1>NOM</h1>

<select id="hallSelect"></select>
<div id="menu"></div>

<script>
const PROXY = "https://api.allorigins.win/raw?url=";
const URL = "https://dining.ucla.edu/menus-at-a-glance/";

let data = [];

async function loadMenu() {
  const res = await fetch(PROXY + encodeURIComponent(URL));
  const html = await res.text();

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");

  const halls = doc.querySelectorAll(".menu-block");

  halls.forEach(hall => {
    const hallName = hall.querySelector("h3")?.innerText.trim();
    if (!hallName) return;

    const meals = {};

    hall.querySelectorAll(".col-md-4").forEach(col => {
      const mealName = col.querySelector("h4")?.innerText.trim();
      if (!mealName) return;

      const items = [];
      col.querySelectorAll("li").forEach(li => {
        items.push(li.innerText.trim());
      });

      meals[mealName] = items;
    });

    data.push({ diningHall: hallName, meals });
  });

  initUI();
}

function initUI() {
  const select = document.getElementById("hallSelect");

  data.forEach((hall, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = hall.diningHall;
    select.appendChild(option);
  });

  render(0);

  select.addEventListener("change", e => {
    render(e.target.value);
  });
}

function render(index) {
  const hall = data[index];
  const container = document.getElementById("menu");
  container.innerHTML = "";

  Object.entries(hall.meals).forEach(([meal, items]) => {
    const div = document.createElement("div");
    div.className = "meal";

    const title = document.createElement("h3");
    title.textContent = meal;
    div.appendChild(title);

    items.forEach(item => {
      const el = document.createElement("div");
      el.className = "item";
      el.textContent = item;
      div.appendChild(el);
    });

    container.appendChild(div);
  });
}

loadMenu();
</script>

</body>
</html>
