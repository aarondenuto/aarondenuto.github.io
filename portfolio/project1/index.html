<script>
const PROXY = "https://api.allorigins.win/raw?url=";
const URL = "https://dining.ucla.edu/menus-at-a-glance/";

let data = [];

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
  console.log(msg);
}

async function loadMenu() {
  try {
    setStatus("Fetching menu...");

    const res = await fetch(PROXY + encodeURIComponent(URL));
    setStatus("Response status: " + res.status);

    const html = await res.text();

    if (!html.includes("menu")) {
      setStatus("ERROR: Proxy blocked or invalid HTML");
      return;
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    // UPDATED SELECTORS (more flexible)
    const halls = doc.querySelectorAll("h3");
    setStatus("Halls found: " + halls.length);

    data = [];

    halls.forEach(h3 => {
      const hallName = h3.innerText.trim();

      // grab next sibling container
      let container = h3.parentElement;
      if (!container) return;

      const meals = {};

      container.querySelectorAll("h4").forEach(mealEl => {
        const mealName = mealEl.innerText.trim();

        let items = [];
        let next = mealEl.nextElementSibling;

        while (next && next.tagName !== "H4") {
          if (next.tagName === "UL") {
            next.querySelectorAll("li").forEach(li => {
              items.push(li.innerText.trim());
            });
          }
          next = next.nextElementSibling;
        }

        if (mealName && items.length) {
          meals[mealName] = items;
        }
      });

      if (Object.keys(meals).length) {
        data.push({ diningHall: hallName, meals });
      }
    });

    if (data.length === 0) {
      setStatus("ERROR: Parsing failed");
      return;
    }

    initUI();
    setStatus("Loaded successfully");

  } catch (err) {
    console.error(err);
    setStatus("ERROR: " + err.message);
  }
}

function initUI() {
  const select = document.getElementById("hallSelect");

  data.forEach((hall, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = hall.diningHall;
    select.appendChild(option);
  });

  render(0);

  select.addEventListener("change", e => {
    render(e.target.value);
  });
}

function render(index) {
  const hall = data[index];
  const container = document.getElementById("menu");
  container.innerHTML = "";

  Object.entries(hall.meals).forEach(([meal, items]) => {
    const div = document.createElement("div");
    div.className = "meal";

    const title = document.createElement("h3");
    title.textContent = meal;
    div.appendChild(title);

    items.forEach(item => {
      const el = document.createElement("div");
      el.className = "item";
      el.textContent = item;
      div.appendChild(el);
    });

    container.appendChild(div);
  });
}

loadMenu();
</script>
