<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Have You Ever</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body { margin:0; background:#0a0a0a; color:#fff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
.screen { display:none; width:100%; max-width:420px; }
.active { display:block; }

.game-banner {
  position:fixed;
  top:0; left:0; width:100%;
  text-align:center;
  padding:10px;
  background:#000;
  font-weight:bold;
}

button { width:100%; padding:12px; margin-top:10px; }
input { width:100%; padding:10px; margin-top:10px; }
</style>
</head>

<body>

<div class="screen active" id="home">
  <input id="name" placeholder="Name">
  <button onclick="create()">Create</button>
  <input id="code" placeholder="ROOM" maxlength="4">
  <button onclick="join()">Join</button>
</div>

<div class="screen" id="lobby">
  <h2 id="room"></h2>
  <div id="players"></div>
  <button id="start" onclick="start()">Start</button>
</div>

<div class="screen" id="game">
  <div class="game-banner">Have You Ever...</div>
  <h3 id="q"></h3>

  <button onclick="vote('yes')">YES</button>
  <button onclick="vote('no')">NO</button>

  <button id="skip" onclick="skip()">Skip</button>
</div>

<script>
const socket = io("https://have-you-ever-backend.onrender.com");

let room = "";
let isHost = false;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function create(){
  const name = document.getElementById("name").value;
  socket.emit("create_room",{name});
}

function join(){
  const name = document.getElementById("name").value;
  const code = document.getElementById("code").value.toUpperCase();

  if(!/^[A-Z]{4}$/.test(code)) return alert("4 letters only");

  socket.emit("join_room",{name,roomId:code});
}

function start(){ socket.emit("start_game",{roomId:room}); }
function vote(v){ socket.emit("vote",{roomId:room,vote:v}); }
function skip(){ socket.emit("skip",{roomId:room}); }

socket.on("room_created",d=>{
  room=d.roomId; isHost=true;
  document.getElementById("room").innerText=room;
  show("lobby");
});

socket.on("room_joined",d=>{
  room=d.roomId;
  show("lobby");
});

socket.on("players",list=>{
  document.getElementById("players").innerText =
    list.map(p=>p.name+(p.host?" (host)":"")).join("\n");

  document.getElementById("start").style.display = isHost?"block":"none";
});

socket.on("game_started",()=>show("game"));

socket.on("question",q=>{
  document.getElementById("q").innerText=q;
  document.getElementById("skip").style.display = isHost?"block":"none";
});
</script>

</body>
</html>
